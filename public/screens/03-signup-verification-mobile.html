<div class="absolute inset-0 pointer-events-none opacity-20" style="background-image: radial-gradient(circle, #1a1c1c 1px, transparent 1px); background-size: 16px 16px;"></div>
<!-- Main Content Canvas (Navigation Suppressed per rules for transactional screen) -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center p-margin-mobile w-full">
<!-- Center Card -->
<main class="w-full max-w-[400px] bg-surface border-[3px] border-on-background [box-shadow:5px_5px_0px_#1a1c1c] p-6 flex flex-col gap-8">
<!-- Branding Header -->
<header class="flex flex-col items-center gap-2 border-b-[3px] border-on-background pb-4">
<h1 class="font-display-lg text-headline-lg-mobile tracking-wider uppercase text-on-background text-center m-0 leading-none">

                </h1>
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest text-center m-0">
                    ACCESS REQUEST
                </h2>
</header>
<!-- Error Banner (Active State requested) -->
<div class="flex items-start gap-3 bg-error-container border-[3px] border-error p-3 [box-shadow:3px_3px_0px_#ba1a1a]">
<span class="material-symbols-outlined text-error icon-fill mt-[-2px]">warning</span>
<p class="font-label-md text-label-md text-error uppercase m-0 leading-tight">
                    ACCESS DENIED: INSTITUTION NOT RECOGNIZED OR BLACKLISTED.
                </p>
</div>
<!-- Form Body -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-background uppercase font-bold" for="institution-email">
                        Institutional Email
                    </label>
<input class="w-full bg-surface-container-lowest border-[3px] border-on-background p-3 font-label-md text-label-md text-on-background focus:outline-none focus:bg-primary-container focus:border-on-background transition-colors placeholder:text-on-surface-variant/50 rounded-none shadow-none" id="institution-email" name="email" type="email" value="agent_smith@unknown.gov"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container border-[3px] border-on-background [box-shadow:5px_5px_0px_#1a1c1c] p-4 flex items-center justify-center gap-3 hover:translate-x-[-2px] hover:translate-y-[-2px] hover:[box-shadow:8px_8px_0px_#1a1c1c] active:translate-x-[3px] active:translate-y-[3px] active:[box-shadow:0px_0px_0px_#1a1c1c] transition-all group cursor-pointer mt-2" type="submit">
<span class="font-headline-md text-headline-md text-on-background m-0 pt-1">
                        INITIATE HANDSHAKE
                    </span>
<span class="material-symbols-outlined text-on-background text-[28px] group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</button>
</form>
</main>
