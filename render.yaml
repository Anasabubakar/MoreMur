# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: murmur-api
    runtime: node
    rootDir: api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OTP_FROM_EMAIL
        sync: false
      - key: ADMIN_KEY
        generateValue: true
